@if (!dismissed()) {
  <div class="alert">
    <span class="alert__icon" aria-hidden="true"></span>

    <div class="alert__body">
      @if (title()) {
        <strong class="alert__title">{{ title() }}</strong>
      }

      <span class="alert__content">
        <ng-content />
      </span>

      @if (linkHref()) {
        <a class="alert__link" [href]="linkHref()">
          {{ linkText() || linkHref() }}
        </a>
      }
    </div>

    <button
      type="button"
      class="alert__close"
      aria-label="Fechar"
      (click)="dismiss()"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path
          d="M4 4l8 8M12 4l-8 8"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>
}
