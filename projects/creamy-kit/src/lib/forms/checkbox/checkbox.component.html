@for (opt of options(); track opt.value) {
  <button
    type="button"
    class="checkbox__row"
    role="checkbox"
    [attr.aria-checked]="isSelected(opt)"
    [attr.aria-disabled]="isDisabled()"
    [disabled]="isDisabled()"
    (click)="toggle(opt)"
  >
    <span
      class="checkbox__box"
      [class.checkbox__box--checked]="isSelected(opt)"
      aria-hidden="true"
    ></span>
    <span class="checkbox__label">{{ opt.label }}</span>
  </button>

  @if (divider()) {
    <creamy-kit-divider weight="2px" color="border-medium" />
  }
}
