<div class="password">
  @if (title()) {
    <span class="password__title">{{ title() }}</span>
  }

  <div class="password__control">
    <input
      class="password__input"
      [type]="revealed() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />

    <button
      type="button"
      class="password__toggle"
      [attr.aria-label]="revealed() ? 'Esconder senha' : 'Exibir senha'"
      [disabled]="isDisabled()"
      (mousedown)="$event.preventDefault()"
      (click)="toggleReveal()"
    >
      @if (revealed()) {
        <!-- olho cortado (esconder) -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l18 18" />
          <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
          <path d="M9.4 5.2A9.5 9.5 0 0 1 12 5c5 0 9 4.5 9 7a12 12 0 0 1-2.2 3" />
          <path d="M6.3 6.3A12 12 0 0 0 3 12c0 2.5 4 7 9 7a9.5 9.5 0 0 0 3.3-.6" />
        </svg>
      } @else {
        <!-- olho (exibir) -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  </div>

  @if (helper()) {
    <span class="password__helper">
      @if (error()) {
        <svg
          class="password__helper-icon"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          aria-hidden="true"
        >
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" />
          <path d="M8 5v3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="8" cy="11" r="0.9" fill="currentColor" />
        </svg>
      }
      {{ helper() }}
    </span>
  }
</div>
