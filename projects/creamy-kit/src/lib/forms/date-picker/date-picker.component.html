<div class="datepicker">
  <header class="datepicker__header">
    <div class="datepicker__heading">
      <strong class="datepicker__title">{{ title() }}</strong>
      @if (description()) {
        <span class="datepicker__desc">{{ description() }}</span>
      }
    </div>
    <button
      type="button"
      class="datepicker__close"
      aria-label="Fechar"
      (click)="onClose()"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  <creamy-kit-calendar
    bare
    [footerValue]="infoText()"
    [ngModel]="selected()"
    (ngModelChange)="onCalendarChange($event)"
  />

  <div class="datepicker__actions">
    <creamy-kit-button class="datepicker__action" (click)="onConfirm()">
      {{ confirmLabel() }}
    </creamy-kit-button>
    <creamy-kit-button
      class="datepicker__action"
      appearance="outline"
      (click)="onCancel()"
    >
      {{ cancelLabel() }}
    </creamy-kit-button>
  </div>
</div>
