<div class="multidropdown">
  @if (title()) {
    <label class="multidropdown__title" [for]="uid">{{ title() }}</label>
  }

  <div class="multidropdown__field">
    <button
      type="button"
      class="multidropdown__control"
      [id]="uid"
      [disabled]="isDisabled()"
      (click)="toggleMenu()"
      aria-haspopup="listbox"
      [attr.aria-expanded]="open()"
    >
      <span
        class="multidropdown__value"
        [class.multidropdown__value--placeholder]="!selectedLabels()"
      >
        {{ selectedLabels() || placeholder() }}
      </span>
      <span class="multidropdown__chevron" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path
            d="M4 6l4 4 4-4"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
    </button>

    @if (open()) {
      <ul class="multidropdown__menu" role="listbox" aria-multiselectable="true">
        @for (opt of options(); track opt.value) {
          <li
            class="multidropdown__option"
            role="option"
            [attr.aria-selected]="isSelected(opt)"
            [class.multidropdown__option--selected]="isSelected(opt)"
            (click)="toggleOption(opt)"
          >
            <span class="multidropdown__check" aria-hidden="true"></span>
            <span class="multidropdown__label">{{ opt.label }}</span>
          </li>
        }
      </ul>
    }
  </div>

  @if (helper()) {
    <span class="multidropdown__helper">
      @if (error()) {
        <creamy-kit-field-error-icon class="multidropdown__helper-icon" />
      }
      {{ helper() }}
    </span>
  }
</div>
