<div class="textbox">
  @if (title()) {
    <label class="textbox__title" [for]="uid">{{ title() }}</label>
  }

  <div class="textbox__control">
    <textarea
      class="textbox__input"
      [id]="uid"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      [attr.maxlength]="maxLength()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    ></textarea>
    <span class="textbox__icon" aria-hidden="true">
      <ng-content select="[icon]" />
    </span>
  </div>

  @if (hasFooter()) {
    <div class="textbox__footer">
      @if (helper()) {
        <span class="textbox__helper">
          @if (error()) {
            <creamy-kit-field-error-icon class="textbox__helper-icon" />
          }
          {{ helper() }}
        </span>
      }

      @if (maxLength() != null) {
        <span class="textbox__counter">{{ value().length }}/{{ maxLength() }}</span>
      }
    </div>
  }
</div>
