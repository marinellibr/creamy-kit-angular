<div class="textbox">
  @if (title()) {
    <span class="textbox__title">{{ title() }}</span>
  }

  <div class="textbox__control">
    <textarea
      class="textbox__input"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      [attr.maxlength]="maxLength()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    ></textarea>
    <span class="textbox__icon" aria-hidden="true">
      <ng-content select="[icon]" />
    </span>
  </div>

  @if (hasFooter()) {
    <div class="textbox__footer">
      @if (helper()) {
        <span class="textbox__helper">
          @if (error()) {
            <svg
              class="textbox__helper-icon"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              aria-hidden="true"
            >
              <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M8 5v3.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <circle cx="8" cy="11" r="0.9" fill="currentColor" />
            </svg>
          }
          {{ helper() }}
        </span>
      }

      @if (maxLength() != null) {
        <span class="textbox__counter">{{ value().length }}/{{ maxLength() }}</span>
      }
    </div>
  }
</div>
