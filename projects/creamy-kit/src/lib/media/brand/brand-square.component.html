<div class="brand-square" [class]="'brand-square--' + size">
  <div *ngIf="isLoading" class="brand-square__loading">
    Loading...
  </div>

  <div *ngIf="error" class="brand-square__error">
    {{ error }}
  </div>

  <div *ngIf="svgContent && !isLoading && !error" class="brand-square__content" [innerHTML]="svgContent"></div>
</div>
