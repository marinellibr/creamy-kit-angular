<div class="calendar">
  <header class="calendar__header">
    <span class="calendar__month">{{ monthLabel() }}</span>
    <div class="calendar__nav">
      <button
        type="button"
        class="calendar__navbtn calendar__navbtn--prev"
        aria-label="Mês anterior"
        (click)="prevMonth()"
      >
        <span class="calendar__chevron" aria-hidden="true"></span>
      </button>
      <button
        type="button"
        class="calendar__navbtn calendar__navbtn--next"
        aria-label="Próximo mês"
        (click)="nextMonth()"
      >
        <span class="calendar__chevron" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div class="calendar__grid">
    @for (w of weekdays; track $index) {
      <span class="calendar__weekday">{{ w }}</span>
    }

    @for (cell of cells(); track $index) {
      @if (cell !== null) {
        <button
          type="button"
          class="calendar__day"
          [class.calendar__day--selected]="isSelected(cell)"
          (click)="selectDay(cell)"
        >
          {{ cell }}
        </button>
      } @else {
        <span class="calendar__day calendar__day--empty"></span>
      }
    }
  </div>

  @if (footerVisible()) {
    <div class="calendar__footer">
      <span class="calendar__footer-dot" aria-hidden="true"></span>
      <div class="calendar__footer-text">
        @if (footerLabel()) {
          <strong class="calendar__footer-label">{{ footerLabel() }}</strong>
        }
        <span class="calendar__footer-value">{{ footerDisplay() }}</span>
      </div>
    </div>
  }
</div>
