<header class="header">
  <div class="header__row">
    @if (back()) {
      <button type="button" class="header__back" aria-label="Voltar" (click)="backClick.emit()">
        <kit-icon name="arrow_left" [size]="20" color="currentColor" ariaLabel="" />
      </button>
    }

    <span class="header__title">{{ title() }}</span>

    <div class="header__actions"><ng-content select="[actions]" /></div>
  </div>
</header>
