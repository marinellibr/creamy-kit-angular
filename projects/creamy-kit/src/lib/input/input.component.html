<div class="field">
  @if (title()) {
    <span class="field__title">{{ title() }}</span>
  }

  <div class="field__control">
    <input
      class="field__input"
      [type]="type()"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    <span class="field__icon" aria-hidden="true">
      <ng-content select="[icon]" />
    </span>
  </div>

  @if (helper()) {
    <span class="field__helper">
      @if (error()) {
        <svg
          class="field__helper-icon"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          aria-hidden="true"
        >
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" />
          <path
            d="M8 5v3.5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <circle cx="8" cy="11" r="0.9" fill="currentColor" />
        </svg>
      }
      {{ helper() }}
    </span>
  }
</div>
