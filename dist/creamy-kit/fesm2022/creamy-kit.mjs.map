<div class="field">
  @if (title()) {
    <label class="field__title" [for]="uid">{{ title() }}</label>
  }

  <div class="field__control">
    <input
      class="field__input"
      [id]="uid"
      [type]="type()"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    <span class="field__icon" aria-hidden="true">
      <ng-content select="[icon]" />
    </span>
  </div>

  @if (helper()) {
    <span class="field__helper">
      @if (error()) {
        <creamy-kit-field-error-icon class="field__helper-icon" />
      }
      {{ helper() }}
    </span>
  }
</div>
