<header class="header">
  <div class="header__row">
    @if (back()) {
      <button type="button" class="header__back" aria-label="Voltar" (click)="backClick.emit()">
        <creamy-kit-icon name="arrow_left" [size]="20" color="currentColor" ariaLabel="" />
      </button>
    } @else if (avatarSrc()) {
      <creamy-kit-avatar-image
        class="header__avatar"
        [src]="avatarSrc()"
        alt="Perfil"
        size="large"
        (click)="avatarClick.emit()"
      />
    }

    <creamy-kit-search class="header__search" [placeholder]="placeholder()">
      <creamy-kit-icon
        iconRight
        name="microphone_base"
        [size]="24"
        color="currentColor"
        ariaLabel="Microfone"
        (click)="micClick.emit()"
      />
    </creamy-kit-search>
  </div>
</header>
